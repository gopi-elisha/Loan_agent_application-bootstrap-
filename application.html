<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>LoanDesk – Loan Entry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</head>

<body class="bg-primary-subtle">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm" style="display:none;">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="#">LoanDesk</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="application.html">Loan Entry</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="emi_page.html">Calculator</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Approved Loans</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="logoutLink" href="#logout">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page1">
        <div class="container mt-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title text-primary-emphasis mb-4">
                        Loan Entry
                    </h3>

                    <div id="messageBox"></div>

                    <form id="loanForm">
                        <div class="mb-3">
                            <label class="form-label">Applicant Name</label>
                            <input type="text" id="name" class="form-control" placeholder="Enter applicant name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="mail" class="form-control" placeholder="Enter applicant name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Loan Amount</label>
                            <input type="number" id="amount" class="form-control" placeholder="Enter loan amount">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Interest Rate (%)</label>
                            <input type="number" id="interest" class="form-control" placeholder="Enter interest rate">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Loan Tenure (months)</label>
                            <input type="number" id="tenure" class="form-control" placeholder="Enter tenure">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Monthly Income</label>
                            <input type="number" id="income" class="form-control" placeholder="Enter applicant name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Adress</label>
                            <input type="text" id="address" class="form-control" placeholder="Enter applicant name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="number" id="phone" class="form-control" placeholder="Enter applicant name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Loan Type</label>
                            <select id="loanType" class="form-select">
                                <option value="">Select type</option>
                                <option value="Personal">Personal</option>
                                <option value="Home">Home</option>
                                <option value="Auto">Auto</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" id="submitApplication">
                            Submit Application
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- dashboard view -->
    <div class="page3" style="display:none;">
        <div class="container mt-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title text-primary-emphasis mb-4">
                        DASHBOARD
                    </h3>

                    <table class="table table-striped">
                        <thead class="table-light">
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Name</th>
                                <th scope="col">Email</th>
                                <th scope="col">Loan Amount</th>
                                <th scope="col">Loan Tenure</th>
                                <th scope="col">Monthly Income</th>
                                <th scope="col">Address</th>
                                <th scope="col">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
