<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>LoanDesk – Loan Entry</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</head>

<body class="bg-primary-subtle">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm" style="display:none;">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="#">LoanDesk</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="application.html">Loan Entry</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="emi_page.html">Calculator</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Approved Loans</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" id="logoutLink" href="#logout">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page2">
        <div class="container mt-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title text-primary-emphasis mb-4">
                        EMI CALCULATOR
                    </h3>

                    <div id="messageBox"></div>

                    <form id="emiCalcForm">
                        <div class="mb-3">
                            <label class="form-label">Loan Amount</label>
                            <input type="number" id="emi_amount" class="form-control" placeholder="Enter loan amount">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Interest Rate (%)</label>
                            <input type="number" id="emi_interest" class="form-control" placeholder="Enter interest rate">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Loan Tenure (months)</label>
                            <input type="number" id="emi_tenure" class="form-control" placeholder="Enter tenure">
                        </div>

                        <button type="submit" class="btn btn-primary w-100" id="calculateEmiBtn">
                            CALCULATE EMI
                        </button>
                    </form>
                    <div id="emi-results"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
